.app{max-width:720px;margin:0 auto;padding:20px}

.qcard{background:var(--carte);border-radius:20px;padding:36px;margin-bottom:16px;box-shadow:0 4px 30px rgba(0,0,0,.12);border:1px solid var(--carte-bord);text-align:center;min-height:420px;display:flex;flex-direction:column;justify-content:center}

.opts{display:flex;flex-direction:column;gap:10px;max-width:480px;margin:0 auto}
.opt{padding:14px 20px;border:2px solid var(--vert-opt);border-radius:14px;cursor:pointer;font-size:.92rem;color:#fff;font-weight:700;transition:all .25s;text-align:left;display:flex;align-items:center;gap:12px;background:var(--vert-opt)}.opt:hover{border-color:var(--or-clair);background:var(--vert-opt-hover)}
.opt.sel{border-color:var(--or-clair);background:var(--or);color:#3A2D08}

.opt.sel .opt-dot{border-color:#3A2D08;background:#3A2D08}
.opt.sel .opt-dot::after{content:'\2713';color:var(--or);font-weight:700;font-size:.82rem}

.gauge{position:relative;width:100%;max-width:480px;margin:20px auto;height:46px;border-radius:14px;overflow:hidden;display:flex}
.gauge-seg{flex:1;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:800;color:#fff;transition:all .3s;text-align:center;line-height:1.15;padding:0 4px}
.gauge-marker{position:absolute;top:-6px;width:4px;height:44px;background:var(--fond);border-radius:2px;transition:left .8s cubic-bezier(.4,0,.2,1);z-index:2}
.gauge-marker::after{content:'';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-top:6px solid var(--fond)}

.bp{background:#2D7A5F;color:#F8F0AE;border:none}.bp:hover{background:#256B52;transform:translateY(-1px)}.bp:disabled{background:var(--sable-dark);color:var(--gris);cursor:not-allowed;transform:none;border:none}
.bs{background:var(--creme);color:var(--terre);border:1px solid var(--sable-dark)}.bs:hover{background:var(--sable)}
.cta{background:linear-gradient(135deg,var(--fond),var(--terre));border-radius:16px;padding:32px;margin:20px 0;text-align:center;color:var(--creme)}.cta h2{color:var(--or-clair);font-family:'Manrope',sans-serif;font-size:1.3rem;margin-bottom:8px}.cta p{color:rgba(248,244,236,.9);font-size:.9rem;margin-bottom:16px}.cta-btn{display:inline-block;background:#F8F0AE;color:#3A3000;padding:12px 28px;border-radius:12px;font-weight:700;font-size:.95rem;border:none;cursor:pointer;font-family:'Manrope',sans-serif;text-decoration:none}.cta-btn:hover{background:#F2E88A}.cta-btn-sec{background:transparent;color:var(--creme);border:1.5px solid rgba(248,244,236,.5)}.cta-btn-sec:hover{background:rgba(248,244,236,.12)}

.video-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0}
.video-label{font-size:.94rem;font-weight:600;color:var(--gris);margin-bottom:10px;text-align:center}
.share-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:16px 0}
.foot{text-align:center;padding:24px 20px;font-size:.78rem;color:var(--gris-clair);line-height:1.8}

.fade-in{animation:fi .4s ease}.pop-in{animation:pop .6s ease}
.opt:focus-visible,.btn:focus-visible,.cta-btn:focus-visible{outline:3px solid #1C4A3A;outline-offset:2px}
.opt:focus,.btn:focus,.cta-btn:focus{outline:3px solid #1C4A3A;outline-offset:2px}
@media(max-width:600px){.app{padding:12px}.card,.qcard{padding:24px}.qtxt{font-size:1.05rem!important}.opts{gap:8px}}
